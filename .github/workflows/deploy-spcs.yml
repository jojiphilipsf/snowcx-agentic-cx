name: Build & Deploy to SPCS

on:
  workflow_dispatch:

env:
  REGISTRY: sfsenorthamerica-jptelco-aws1.registry.snowflakecomputing.com
  IMAGE_PATH: /telecom_cx/data/telecom_cx_repo/snowcx-react

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Login to Snowflake registry
        run: |
          mkdir -p ~/.snowflake

          echo "$SNOWFLAKE_PRIVATE_KEY" > ~/.snowflake/key.p8
          chmod 600 ~/.snowflake/key.p8

          cat > ~/.snowflake/connections.toml << 'EOF'
          [default]
          account = "sfsenorthamerica-jptelco_aws1"
          user = "JPHILIP2"
          authenticator = "SNOWFLAKE_JWT"
          private_key_file = "~/.snowflake/key.p8"
          role = "SYSADMIN"
          warehouse = "COMPUTE_WH"
          EOF
          chmod 600 ~/.snowflake/connections.toml

          snow spcs image-registry login --connection default
        env:
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t ${{ env.REGISTRY }}${{ env.IMAGE_PATH }}:latest .

      - name: Push to Snowflake registry
        run: docker push ${{ env.REGISTRY }}${{ env.IMAGE_PATH }}:latest
