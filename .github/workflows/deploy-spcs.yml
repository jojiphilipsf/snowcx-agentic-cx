name: Build & Deploy to SPCS

on:
  workflow_dispatch:

env:
  REGISTRY: sfsenorthamerica-jptelco-aws1.registry.snowflakecomputing.com
  IMAGE_PATH: /telecom_cx/data/telecom_cx_repo/snowcx-react

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Login to Snowflake registry
        run: |
          pip install pyjwt cryptography
          python3 - <<'PYEOF'
          import jwt, time, hashlib, base64, os, subprocess
          from cryptography.hazmat.primitives import serialization

          key_pem = os.environ["SNOWFLAKE_PRIVATE_KEY"]
          private_key = serialization.load_pem_private_key(key_pem.encode(), password=None)

          pub_der = private_key.public_key().public_bytes(
              serialization.Encoding.DER, serialization.PublicFormat.SubjectPublicKeyInfo
          )
          fp = "SHA256:" + base64.b64encode(hashlib.sha256(pub_der).digest()).decode()

          account = os.environ["SF_ACCOUNT_LOCATOR"]
          user = os.environ["SF_USER"]
          qualified = f"{account}.{user}"

          token = jwt.encode(
              {"iss": f"{qualified}.{fp}", "sub": qualified, "iat": int(time.time()), "exp": int(time.time()) + 3600},
              private_key, algorithm="RS256"
          )

          registry = os.environ["SF_REGISTRY"]
          proc = subprocess.Popen(
              ["docker", "login", registry, "-u", "0sessiontoken", "--password-stdin"],
              stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True
          )
          stdout, stderr = proc.communicate(input=token)
          print(stdout)
          if proc.returncode != 0:
              print(f"Login failed: {stderr}")
              exit(1)
          PYEOF
        env:
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SF_ACCOUNT_LOCATOR: ${{ secrets.SF_ACCOUNT_LOCATOR }}
          SF_USER: ${{ secrets.SF_USER }}
          SF_REGISTRY: ${{ env.REGISTRY }}

      - name: Build Docker image
        run: |
          docker build --platform linux/amd64 -t ${{ env.REGISTRY }}${{ env.IMAGE_PATH }}:latest .

      - name: Push to Snowflake registry
        run: |
          docker push ${{ env.REGISTRY }}${{ env.IMAGE_PATH }}:latest
